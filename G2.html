<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نسخ الأمثال</title>
<style>
body {
    font-family: Arial;
    background: #1e1e2f;
    color: white;
    padding: 20px;
    direction: rtl;
}
button {
    background: #ffbf69;
    border: none;
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}
textarea {
    width: 100%;
    height: 300px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>انسخ الأمثال</h2>

<button onclick="copyText()">📋 نسخ الكل</button>

<textarea id="text">
من خاف سلم
ابيك عون صرت فرعون - مثل ووجهك حزين
مكره أخاك لا بطل
أرضى بقردك لا يجيك أقرد منه
من بغى الدح ما قال أح. - مثل واقف على رجل واحدة
شي بلاش ربحه بيَن.
شين وقوي عين
ابعد عن الشر وغني له - مثل بيد واحدة فقط
من طلع من داره قل مقداره
يمدح السوق من ربح فيه - مثل وانت تهز راسك يمين يسار
أقضب مجنونك لا يجيك أجن منه
كثر الدق يفك اللحام - مثل وأنت ترسل بوسات للفريق المنافس طوال التمثيل
الطول طول نخله والعقل عقل صخله
العين ما تعلى على الحاجب - مثل ووجهك للجدار
الذيب ما يهرول عبث - مثل وانت تدور حول نفسك بعد كل كلمة
قال انفخ ياشريم قال مامن برطم - مثل ويدك فرق راسك
مد رجولك على قد لحافك - مثل يديك فرق راسك
ما طاح إلا انبطح
أبو طبيع ما يجوز عن طبعه
جاء بيكحلها عماها - مثل ووجهك للجدار
الوجه من الوجه أبيض - مثل ووجهك معصب 
اذا صاحبك عسل لا تلحسه كله
إذا طاح الجمل كثرت سكاكينه
اللي في القدر يطلعه الملاس - مثل باستخدام يد واحده
ما أردى من المربوط إلا المنفلت
من قال هاه سمع
تجيك التهايم وأنت نايم - مثل وانت تحرك راسك يمين ويسار
حاميها حراميها
القلوب شواهد - مثل ببطء شديد
الجود من الموجود
نوم الظالم عباده - مثل بيد واحده
يا دهينه لا تنكتين
إذا شبع الحمار نهق - مثل باستخدام يدك اليمنى فقط
جاك الموت يا تارك الصلاة
كل ساقط وله لاقط
قال وش دراك انها كذبة قال من كبرها  - مثل وانت رافع يدك اليسرى 
حشر مع الناس عيد
مايذوق العز خمام الوسايد
خالف تُعرف  - مثل كانك روبوت 
الموت ولا المذلة 
أفتح فمك يرزقك الله 
اللي هذا أوله ينعاف تاليه 
ما لك إلا خشمك لو كان عوج  - مثل ووجهك للجدار
اصرف ما في الجيب يأتيك ما في الغيب - مثل ووجهك للجدار
اختلط الحابل بالنابل 
عط الخباز خبزك لو اكل نصه - مثل بيد وحده بس 
لكل جواد كبوة  - مثل وأنت جالس
زي الاطرش بالزفة
سحابة صيف 
جزاة المعروف سبع كفوف 

</textarea>

<script>
function copyText() {
  var copyText = document.getElementById("text");
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  document.execCommand("copy");
  alert("تم النسخ ✅");
}
</script>

</body>
</html>
