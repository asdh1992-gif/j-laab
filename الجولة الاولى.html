<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نسخ الأمثال</title>
<style>
body {
    font-family: Arial;
    background: #1e1e2f;
    color: white;
    padding: 20px;
    direction: rtl;
}
button {
    background: #ffbf69;
    border: none;
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}
textarea {
    width: 100%;
    height: 300px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>انسخ الأمثال</h2>

<button onclick="copyText()">📋 نسخ الكل</button>

<textarea id="text">
يدٌ  واحدة  ما تصفـِّق  - مثل بدون استخدام يديك
يداك أوكتا وفوك نفخ.
كل إناء بما فيه ينضح. - مثل وانت تقفز مكانك
لا يشق له غبار.
اتق شر الحليم إذا غضب.
طق الحديد وهو ساخن.
لا يضر السحاب نبح الكلاب.
وفر قرشك الأبيض ليومك الأسود
الحب أعمى - مثل ويدك فوق راسك
قاب قوسين أو أدنى - مثل باستخدام يدك اليسرى فقط
إن غداً لناظره قريب
وافق شن طبقة
رمية من غير رام
إذا لم تستح فاصنع ما شئت
العتاب قبل العقاب
عذر أقبح من ذنب
العرق دساس - مثل ووجهك للفريق المنافس
دخول الحمام مش زي خروجه
الجار قبل الدار
إن من البيان لسحرًا
خير الكلام ما قل ودل - مثل وانت مغطي عينك بيدك
هذا الشبل من ذاك الأسد
سرق الجمل بما حمل
القرد في عين أمه غزال
الكلام لك واسمعي ياجارة - مثل وانت رافع يدك اليمنى 
ابن البط عوام - مثل وانت جالس
أبصر من زرقاء اليمامة - مثل بدون تأشر على عينك
ثلثين الولد لخاله - مثل بيد وحده
قال هاك خير قال مامعي ماعون - مثل وأنت تلوّح للفريق المنافس 
القربة مشقوقة
من خرج من داره قلّ مِقداره - مثل وأنت مغمض عين واحدة 
جلد ماهو بجلدك على الشوك جره
الحي يحييك ، والميت يزيدك غبن
إذا فات الفوت، ماينفع الصوت
لا ناقة لي فيها ولا جمل - مثل وانت جالس
إن طاعك الزمان والا طعه
اسأل مجرب ولا تسأل طبيب - مثل وأنت تحرك حواجبك طوال التمثيل 
اللي مايعرفك مايثمنك
ياشين السرج على البقرة - مثل وأنت تلمس أنفك طوال التمثيل 
صام صام وافطر على بصلة - مثل وانت مغمص عيونك
العين بصيرة واليد قصيرة - مثل ووجهك للجدار
يامن شرا له من حلاله عله - مثل وانت نافخ خدودك طول الوقت
الصديق وقت الضيق.
من جدّ وجدَ  ومنْ زرعَ حصدَ.
إذا كان الكلامُ من فضة  فالسكوتُ من ذهب .
القناعة كنزٌ لا يفنى.
كلٍ يشوف الناس بعين طبعه. - مثل وانت تمشي مكانك (حركة مستمرة)
حبل الكذب قصير - مثل ويدك اليمنى فوق راسك 

...
</textarea>

<script>
function copyText() {
  var copyText = document.getElementById("text");
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  document.execCommand("copy");
  alert("تم النسخ ✅");
}
</script>

</body>
</html>
